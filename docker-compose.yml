services:
  postgres:
    image: postgres:16-alpine
    container_name: worqly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: worqly
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - worqly-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: worqly-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - worqly-redis:/data

volumes:
  worqly-postgres:
  worqly-redis:

